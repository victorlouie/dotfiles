import = [
    "~/.config/alacritty/themes/coolnight.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10

# decorations = "Buttonless"

opacity = 0.8
blur = true

#option_as_alt = "Both"

[keyboard]
bindings = [
  { key = "Left",     mods = "Alt",     chars = "\u001BB"                         },
  { key = "Right",    mods = "Alt",     chars = "\u001BF"                         },
  { key = "Back",     mods = "Alt",     chars = "\u001B\u007F"                    },
  { key = "Left",     mods = "Super",   chars = "\u0001"                          },
  { key = "Right",    mods = "Super",   chars = "\u0005"                          },
  { key = "Back",     mods = "Super",   chars = "\u0015"                          },
  { key = "N",        mods = "Super",   action = "SpawnNewInstance"               },
  { key = "PageUp",   mods = "Control", action = "ScrollPageUp"                   },
  { key = "PageDown", mods = "Control", action = "ScrollPageDown"                 },
  { key = "Space",    mods = "Shift",   action = "ToggleViMode", mode = "~Search" }
]

[selection]
save_to_clipboard = true

[scrolling]
history = 10000
multiplier = 5

[font]
normal.family = "Hack Nerd Font"
size = 15
